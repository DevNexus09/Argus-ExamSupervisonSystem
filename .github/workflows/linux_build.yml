name: Build Linux Executable

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libpcap-dev libglfw3-dev libgl1-mesa-dev

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Compile Student Agent
        run: cmake --build build --target student_agent

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: argus-linux-binary
          path: build/Code/Student/student_agent